<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZENDVXZ | Quantum SIM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #8b5cf6; --accent: #00f2ff; --bg: #050507; --inter: #ff7a00; --error: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.15), #000); }
        .container { width: 90%; max-width: 400px; background: rgba(10, 10, 15, 0.98); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 30px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        h1 { font-size: 26px; letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 15px var(--primary); }
        .console { background: #000; border-radius: 20px; padding: 15px; font-family: 'Source Code Pro', monospace; font-size: 11px; text-align: left; color: var(--accent); margin-bottom: 25px; border: 1px solid rgba(0, 242, 255, 0.2); height: 140px; overflow-y: auto; line-height: 1.6; }
        .btn-action { width: 100%; padding: 22px; border-radius: 18px; border: none; font-family: 'Orbitron'; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-bottom: 12px; }
        .btn-pix { background: var(--inter); color: #fff; box-shadow: 0 8px 20px rgba(255, 122, 0, 0.3); }
        .btn-gen { background: linear-gradient(135deg, var(--primary), #d946ef); color: #fff; display: none; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); }
        .btn-action:disabled { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .result-panel { display: none; margin-top: 25px; padding: 25px; background: rgba(139, 92, 246, 0.05); border-radius: 20px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>HAZENDVXZ</h1>
    <div id="log-console" class="console">> NUCLEO_OPERACIONAL_ATIVO...</div>

    <div id="pay-area">
        <div style="font-size: 32px; margin-bottom: 15px; font-weight: 900;">R$ 15,00</div>
        <button id="btn-pay" onclick="fazerPagamento()" class="btn-action btn-pix">Copiar Chave PIX</button>
    </div>

    <button id="btn-main" onclick="gerarNumero()" class="btn-action btn-gen">Gerar Nova Identidade</button>

    <div id="res-area" class="result-panel">
        <div id="num-display" style="font-size: 24px; color: var(--accent); font-weight: 700;">---</div>
        <div id="sms-status" style="font-size: 11px; color: #666; margin: 10px 0;">INTERCEPTANDO SMS...</div>
        <div id="sms-display" style="font-size: 45px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--primary); display:none;">000000</div>
    </div>
</div>

<script>
    const API_KEY = '44BfdB0Bc62ce8082994ccd65B19B4B0';
    const PIX_CHAVE = "00020101021126580014br.gov.bcb.pix01368a947c7a-1abc-481c-86da-f5e795b9735f520400005303986540515.005802BR5917KAMILLY V S SILVA6007BARUERI62070503***63044D60";
    
    function log(m, color = null) {
        const c = document.getElementById('log-console');
        const style = color ? ` style="color:${color}"` : '';
        c.innerHTML += `<br>> <span${style}>${m}</span>`;
        c.scrollTop = c.scrollHeight;
    }

    function fazerPagamento() {
        navigator.clipboard.writeText(PIX_CHAVE);
        document.getElementById('btn-pay').innerText = "COPIADO!";
        log("SINAL_PAGAMENTO: AGUARDANDO...");
        setTimeout(() => {
            log("PAGAMENTO_CONFIRMADO", "#22c55e");
            document.getElementById('pay-area').style.display = 'none';
            document.getElementById('btn-main').style.display = 'block';
        }, 4000);
    }

    async function gerarNumero() {
        const btn = document.getElementById('btn-main');
        btn.disabled = true;
        log("REQUISITANDO_IDENTIDADE...");

        // Endpoint para Hero-SMS via Proxy AllOrigins
        const target = `https://hero-sms.com{API_KEY}&action=getNumber&service=wa&country=13`;
        const proxyUrl = `https://allorigins.win{encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = json.contents;

            if (data && data.includes('ACCESS_NUMBER')) {
                const parts = data.split(':');
                const id = parts[1];
                const num = parts[2];
                log("ID_IDENTIFICADA: " + id, "#00f2ff");
                document.getElementById('res-area').style.display = 'block';
                document.getElementById('num-display').innerText = '+' + num;
                monitorarSMS(id);
            } else if (data && data.includes('NO_BALANCE')) {
                log("ERRO: SALDO_INSUFICIENTE_NO_HEROSMS", "#ff4444");
                alert("Atenção: A conta do sistema está sem saldo na Hero-SMS.");
                btn.disabled = false;
            } else {
                log("AVISO_SISTEMA: " + data, "#ff7a00");
                btn.disabled = false;
            }
        } catch (error) {
            log("FALHA_CONEXAO: RE-TENTANDO...", "#ff4444");
            setTimeout(gerarNumero, 3000);
        }
    }

    function monitorarSMS(id) {
        const interval = setInterval(async () => {
            const target = `https://hero-sms.com{API_KEY}&action=getStatus&id=${id}`;
            const proxyUrl = `https://allorigins.win{encodeURIComponent(target)}`;
            try {
                const r = await fetch(proxyUrl);
                const j = await r.json();
                const s = j.contents;
                if (s && s.includes('STATUS_OK')) {
                    const code = s.split(':')[1];
                    log("SMS_RECEBIDO!", "#22c55e");
                    document.getElementById('sms-status').innerText = "CÓDIGO RECEBIDO:";
                    const display = document.getElementById('sms-display');
                    display.style.display = 'block';
                    display.innerText = code;
                    clearInterval(interval);
                } else {
                    log("VARRENDO_FREQUENCIAS...");
                }
            } catch (e) {}
        }, 6000);
    }
</script>
</body>
</html>
